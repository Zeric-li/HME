model_id: Qwen/Qwen3-VL-4B-Instruct
output_dir: ./outputs/qwen3vl-crohme-lora
run_name: qwen3vl-crohme-lora

train_dataset_id: Neeze/CROHME-full
train_split: train

eval_dataset_id: Neeze/CROHME-full
eval_split: 2019

max_train_samples: null
max_eval_samples: 300
shuffle_train: true
seed: 42

system_prompt: >-
  You are a handwritten mathematical expression transcription engine.
  Your entire reply must be exactly one raw LaTeX expression.
  Output only the expression content itself, with no surrounding formatting or wrapper symbols.

user_prompt: >-
  Transcribe the handwritten mathematical expression in the image into one raw LaTeX expression.
  Strict output contract:
  - Output exactly one line.
  - Output only the raw LaTeX tokens for the expression.
  - Do not wrap the answer in $...$, $$...$$, \(...\), or \[...\].
  - Do not add "latex:", "answer:", markdown fences, explanations, spaces before or after, or any extra text.
  Correct format example: \frac{a}{b}+c
  Wrong format examples: $\frac{a}{b}+c$, $$\frac{a}{b}+c$$, \(\frac{a}{b}+c\), LaTeX: \frac{a}{b}+c

min_pixels: 200704
max_pixels: 602112

max_seq_length: 1024
max_new_tokens: 128

torch_dtype: bfloat16
attn_implementation: flash_attention_2

gradient_checkpointing: true
per_device_train_batch_size: 2
per_device_eval_batch_size: 1
gradient_accumulation_steps: 8
num_train_epochs: 2
learning_rate: 2.0e-4
weight_decay: 0.0
warmup_ratio: 0.03
lr_scheduler_type: cosine
logging_steps: 10
save_steps: 200
eval_steps: 200
save_total_limit: 2

lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_bias: none
lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj

report_to: none
